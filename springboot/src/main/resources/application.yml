# Server configuration
server:
  port: 8080
  address: 0.0.0.0

# Spring Data Source (MySQL)
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/theater_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 180000
      max-lifetime: 1200000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# OpenAPI (Swagger UI) configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Logging configuration
logging:
  level:
    org.springframework: INFO
    com.example: DEBUG

